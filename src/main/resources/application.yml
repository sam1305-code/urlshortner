spring:
  application:
    name: distributed-url-shortener

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt:
      issuer: distributed-url-shortener
      # Development-only secret. Override this with an environment-specific secret outside local development.
      secret: change-this-development-secret-must-be-at-least-32-bytes-long
      access-token-ttl: 15m
